<!doctype html>
<html>
  <head>
    <title>Virtual Ukulele</title>
    <link href="https://fonts.cdnfonts.com/css/opendyslexic" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Virtual Low G Ukulele</h1>
    <h2>
      How to play: the four rows of your keyboard are the four ukulele strings.
      1, Q, A, and Z are your open strings. Move the window to play more notes.
      You can also click. Press the toggle button to hide/show note names for
      each fret.
    </h2>
    <button id="toggleLabels">Toggle Note Names</button>

    <div class="ukulele">
      <div id="ukulele" class="fretboard"></div>
      <div id="uke-body" class="ukulele-body">
        <div class="body-string" data-row="0"></div>
        <div class="body-string" data-row="1"></div>
        <div class="body-string" data-row="2"></div>
        <div class="body-string" data-row="3"></div>
      </div>
    </div>
    <div id="windowOverlay"></div>

    <script src="ukulele.js"></script>
  </body>
</html>
